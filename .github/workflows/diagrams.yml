name: Diagrams

on:
  pull_request:
    branches: [main]
    paths:
      - docs/diagrams/**
      - '**/*.md'
      - scripts/render-diagrams.sh
      - scripts/check-readme-images.py
      - .github/workflows/diagrams.yml

concurrency:
  group: diagrams-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render D2 diagrams
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rsvg-convert
        run: |
          sudo apt-get update
          # Pinned to the ubuntu-24.04 release-pocket version for reproducible PNG
          # output. The release pocket is immutable for the LTS lifetime, so this
          # exact version stays installable. Bump together with runs-on when
          # changing the runner.
          sudo apt-get install -y --no-install-recommends librsvg2-bin=2.58.0+dfsg-1build1

      - name: Check D2 formatting
        env:
          # renovate: datasource=docker depName=terrastruct/d2
          D2_VERSION: 'v0.7.1'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/work" -w /work "terrastruct/d2:${D2_VERSION}" \
            fmt docs/diagrams/*.d2
          if ! git diff --quiet -- 'docs/diagrams/*.d2'; then
            echo "ERROR: .d2 sources are not canonically formatted (run d2 fmt):"
            git --no-pager diff --stat -- 'docs/diagrams/*.d2'
            exit 1
          fi

      - name: Render diagrams
        run: bash scripts/render-diagrams.sh

      - name: Verify Markdown image references resolve
        run: python3 scripts/check-readme-images.py

      - name: Commit rendered diagrams
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "docs: render D2 diagrams"
          file_pattern: docs/diagrams/*.svg docs/diagrams/*.png
