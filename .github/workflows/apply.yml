name: Terraform apply

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
    paths-ignore:
      - 'README.md'
      - 'renovate.json'
  workflow_dispatch:

env:
  KUBECONFIG: /tmp/kubeconfig
  KUBECTL_KUBERC: "false"

jobs:
  check-conditions:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      apply_mode: ${{ steps.check.outputs.apply_mode }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHOULD_RUN="false"
          APPLY_MODE="normal"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "✅ Manual dispatch detected."
            SHOULD_RUN="true"
            APPLY_MODE="normal"

          elif [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            TITLE="${{ github.event.pull_request.title }}"
            BODY="${{ github.event.pull_request.body }}"
            COMMIT_MSG=$(gh pr view ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --json commits \
              --jq '.commits[-1].messageHeadline + " " + .commits[-1].messageBody')
            FULL_TEXT="$TITLE $BODY $COMMIT_MSG"

            # Patterns based on https://docs.github.com/en/actions/how-tos/manage-workflow-runs/skip-workflow-runs
            if echo "$FULL_TEXT" | grep -iqE "\[(skip ci|ci skip|no ci|skip actions|actions skip)\]"; then
              echo "⛔ Skip pattern detected in PR title or body."
              SHOULD_RUN="false"
            else
              echo "✅ PR Merged and no skip patterns found."
              SHOULD_RUN="true"
            fi

            # Parse PR body checkboxes for apply mode
            DRAIN=$(echo "$BODY" | grep -c '\- \[x\] Drain cluster nodes before apply' || true)
            DESTROY=$(echo "$BODY" | grep -c '\- \[x\] Destroy and recreate infrastructure before apply' || true)
            CONFIRM=$(echo "$BODY" | grep -c '\- \[x\] I confirm the destructive action selected above' || true)

            if [[ "$DRAIN" -gt 0 && "$DESTROY" -gt 0 ]]; then
              echo "❌ Cannot select both drain and destroy. These are mutually exclusive."
              exit 1
            fi

            if [[ "$DESTROY" -gt 0 ]]; then
              if [[ "$CONFIRM" -eq 0 ]]; then
                echo "❌ Destroy requires confirmation checkbox."
                exit 1
              fi
              echo "💣 Destroy mode selected and confirmed."
              APPLY_MODE="destroy"
            elif [[ "$DRAIN" -gt 0 ]]; then
              if [[ "$CONFIRM" -eq 0 ]]; then
                echo "❌ Drain requires confirmation checkbox."
                exit 1
              fi
              echo "🔄 Drain mode selected and confirmed."
              APPLY_MODE="drain"
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "apply_mode=$APPLY_MODE" >> $GITHUB_OUTPUT

  download-plan:
    name: Download Terraform plan and exitcode from S3
    needs: check-conditions
    if: |
      needs.check-conditions.outputs.should_run == 'true'
        && needs.check-conditions.outputs.apply_mode != 'destroy'
        && github.event_name == 'pull_request_target'
    runs-on: self-hosted
    container:
      image: amazon/aws-cli:latest
    steps:
      - name: Download Terraform plan and exitcode from S3
        uses: ./.github/actions/s3-cp
        with:
          aws_access_key_id: ${{ secrets.S3_ACCESS_KEY }}
          aws_secret_access_key: ${{ secrets.S3_SECRET_KEY }}
          aws_endpoint_url: ${{ secrets.S3_ENDPOINT }}
          source: |
            s3://${{ secrets.S3_TF_PLAN_BUCKET }}/pr-${{ github.event.pull_request.number }}/
          destination: .
          recursive: 'true'

      - name: Upload Terraform plan and exitcode artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: |
            plan.tfplan
            plan.exitcode

  pre-apply:
    name: Drain cluster nodes
    needs: [check-conditions, download-plan]
    if: |
      !cancelled()
        && needs.check-conditions.outputs.should_run == 'true'
        && needs.check-conditions.outputs.apply_mode == 'drain'
    runs-on: self-hosted
    container:
      image: bitnami/kubectl:latest
    env:
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_RAW }}" > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Drain all nodes
        run: |
          MASTERS=""
          WORKERS=""
          for node in $(kubectl get nodes -o jsonpath='{.items[*].metadata.name}'); do
            if kubectl get node "$node" -o jsonpath='{.metadata.labels}' | grep -q '"node-role.kubernetes.io/master"'; then
              MASTERS="$MASTERS $node"
            else
              WORKERS="$WORKERS $node"
            fi
          done

          for node in $WORKERS; do
            echo "🔄 Draining worker $node..."
            kubectl drain "$node" --ignore-daemonsets --delete-emptydir-data --timeout=120s
          done

          for node in $MASTERS; do
            echo "🔄 Draining master $node..."
            kubectl drain "$node" --ignore-daemonsets --delete-emptydir-data --timeout=120s
          done

  apply:
    name: Terraform apply
    needs: [check-conditions, download-plan, pre-apply]
    if: |
      !cancelled()
        && needs.check-conditions.outputs.should_run == 'true'
        && (needs.pre-apply.result == 'success' || needs.pre-apply.result == 'skipped')
        && (needs.download-plan.result == 'success' || needs.download-plan.result == 'skipped')
    runs-on: self-hosted
    container:
      image: hashicorp/terraform:latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read manifest file
        run: |
          echo 'manifest<<EOF' >> $GITHUB_ENV
          cat packer-manifest.json >> $GITHUB_ENV
          echo -e '\nEOF' >> $GITHUB_ENV

      - name: Download Terraform plan artifact
        if: needs.check-conditions.outputs.apply_mode != 'destroy' && github.event_name == 'pull_request_target'
        uses: actions/download-artifact@v8
        with:
          name: tfplan

      - name: Check for changes
        id: check
        run: |
          HAS_CHANGES="true"

          if [[ "${{ needs.check-conditions.outputs.apply_mode }}" == "destroy" ]]; then
            echo "💣 Destroy mode — changes implied."
          elif [[ -f "plan.exitcode" ]]; then
            CODE=$(cat plan.exitcode)
            if [[ "$CODE" == "2" ]]; then
              HAS_CHANGES="true"
              echo "⚠️ Changes detected (Exit Code 2)."
            else
              HAS_CHANGES="false"
              echo "✅ No changes (Exit Code $CODE)."
            fi
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

      - name: Destroy infrastructure
        if: needs.check-conditions.outputs.apply_mode == 'destroy'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT }}
          PM_API_URL: ${{ secrets.PM_API_URL }}
          PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
          PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}
          TF_VAR_ssh_pub_key: ${{ vars.TF_VAR_SSH_PUB_KEY }}
          TF_VAR_base_vm_name: ${{ fromJSON(env.manifest).builds[0].custom_data.vm_name }}
        run: |
          terraform init
          terraform destroy -auto-approve

      - name: Apply Terraform
        if: steps.check.outputs.has_changes == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT }}
          PM_API_URL: ${{ secrets.PM_API_URL }}
          PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
          PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}
          TF_VAR_ssh_pub_key: ${{ vars.TF_VAR_SSH_PUB_KEY }}
          TF_VAR_base_vm_name: ${{ fromJSON(env.manifest).builds[0].custom_data.vm_name }}
        run: |
          terraform init
          if [[ -f "plan.tfplan" ]]; then
            terraform apply plan.tfplan
          else
            terraform apply -auto-approve
          fi

  post-apply:
    name: Uncordon cluster nodes
    needs: [check-conditions, apply]
    if: |
      always()
        && needs.check-conditions.outputs.apply_mode == 'drain'
        && needs.check-conditions.outputs.should_run == 'true'
    runs-on: self-hosted
    container:
      image: bitnami/kubectl:latest
    env:
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_RAW }}" > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Wait for nodes to be ready
        run: kubectl wait --for=condition=Ready nodes --all --timeout=300s

      - name: Uncordon all nodes
        run: |
          for node in $(kubectl get nodes -o jsonpath='{.items[*].metadata.name}'); do
            echo "✅ Uncordoning $node..."
            kubectl uncordon "$node"
          done

  trigger-ansible:
    name: Trigger Ansible deployment
    needs: [check-conditions, apply, post-apply]
    if: |
      !cancelled()
        && needs.check-conditions.outputs.should_run == 'true'
        && needs.apply.result == 'success'
        && needs.apply.outputs.has_changes == 'true'
        && (needs.post-apply.result == 'success' || needs.post-apply.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Ansible Deployment
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: Starktastic-Homelab/ansible
          event-type: infrastructure-changed

  cleanup:
    name: Cleanup after apply
    needs: [check-conditions, trigger-ansible, post-apply]
    if: |
      always()
        && needs.check-conditions.outputs.should_run == 'true'
        && needs.check-conditions.outputs.apply_mode != 'destroy'
        && github.event_name == 'pull_request_target'
    runs-on: self-hosted
    container:
      image: amazon/aws-cli:latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT }}
    steps:
      - name: Remove Terraform plan & exitcode files from S3
        run: aws s3 rm s3://${{ secrets.S3_TF_PLAN_BUCKET }}/pr-${{ github.event.pull_request.number }} --recursive --quiet
